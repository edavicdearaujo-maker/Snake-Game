<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #66fcf1;
        }

        .score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #c5a5c5;
        }

        .score-board span {
            color: #ffffff;
            font-weight: bold;
        }

        canvas {
            background-color: #1f2833;
            border: 4px solid #45f3ff;
            box-shadow: 0 0 20px rgba(70, 243, 255, 0.3);
            border-radius: 4px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Snake Game</h1>
        <div class="score-board">Pontuação: <span id="score">0</span></div>
        
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha</title>
    <style>
        /* --- ESTILIZAÇÃO DO JOGO --- */
        body {
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin: 5px 0;
            font-size: 24px;
        }

        .placar {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        canvas {
            border: 4px solid #45f3ff;
            background-color: #1f2833;
            box-shadow: 0 0 20px #45f3ff;
            max-width: 100%;
            height: auto;
        }

        /* --- CONTROLES PARA CELULAR (D-PAD) --- */
        .controles-celular {
            display: none; /* Esconde no Computador por padrão */
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            user-select: none;
            -webkit-user-select: none;
        }

        .linha-horizontal {
            display: flex;
            justify-content: space-between;
            width: 140px;
            margin: 5px 0;
        }

        .btn-controle {
            width: 60px;
            height: 60px;
            background-color: #1f2833;
            border: 2px solid #66fcf1;
            color: #66fcf1;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background 0.1s;
        }

        /* Efeito visual ao tocar no botão */
        .btn-controle:active {
            background-color: #45f3ff;
            color: #0b0c10;
        }

        /* REGRAS APENAS PARA TELAS PEQUENAS (CELULAR) */
        @media (max-width: 768px) {
            .controles-celular {
                display: flex; /* Mostra o controle apenas no celular */
            }
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div class="placar">Pontos: <span id="score">0</span></div>

    <canvas id="snakeCanvas" width="400" height="400"></canvas>

    <div class="controles-celular">
        <button class="btn-controle" id="btn-up">▲</button>
        <div class="linha-horizontal">
            <button class="btn-controle" id="btn-left">◀</button>
            <button class="btn-controle" id="btn-right">▶</button>
        </div>
        <button class="btn-controle" id="btn-down">▼</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
